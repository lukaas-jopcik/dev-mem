{% extends "base.html" %}
{% block title %}Analytics — dev-mem{% endblock %}
{% block heading %}Analytics{% endblock %}

{% block content %}
<div class="space-y-6">

  <!-- Top row: score trend + time per project -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

    <div class="bg-slate-800 border border-slate-700 rounded-xl p-5">
      <h2 class="text-sm font-semibold text-slate-300 mb-4">Prompt Score Trend (30 days)</h2>
      <canvas id="scoreTrendChart" height="200"></canvas>
    </div>

    <div class="bg-slate-800 border border-slate-700 rounded-xl p-5">
      <h2 class="text-sm font-semibold text-slate-300 mb-4">Time Per Project (hrs)</h2>
      <canvas id="timeProjectChart" height="200"></canvas>
    </div>

  </div>

  <!-- Command heatmap -->
  <div class="bg-slate-800 border border-slate-700 rounded-xl p-5">
    <h2 class="text-sm font-semibold text-slate-300 mb-4">Command Heatmap (Hour x Day)</h2>
    <div class="overflow-x-auto">
      <div id="heatmapContainer">
        <div class="heatmap-grid" id="heatmapGrid">
          <!-- built by JS -->
        </div>
      </div>
    </div>
    <div class="flex items-center gap-2 mt-3 text-xs text-slate-500">
      <span>Less</span>
      <span class="heatmap-cell w-4" data-level="0"></span>
      <span class="heatmap-cell w-4" data-level="1"></span>
      <span class="heatmap-cell w-4" data-level="2"></span>
      <span class="heatmap-cell w-4" data-level="3"></span>
      <span class="heatmap-cell w-4" data-level="4"></span>
      <span>More</span>
    </div>
  </div>

  <!-- Error frequency -->
  <div class="bg-slate-800 border border-slate-700 rounded-xl p-5">
    <h2 class="text-sm font-semibold text-slate-300 mb-4">Error Frequency (Top 10)</h2>
    <canvas id="errorFreqChart" height="180"></canvas>
  </div>

</div>

<script>
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

Chart.defaults.color = '#94a3b8';
Chart.defaults.borderColor = '#334155';

async function loadCharts() {
  const resp = await fetch('/api/stats?days=30');
  const data = await resp.json();

  // Score trend chart
  const scoreTrendCtx = document.getElementById('scoreTrendChart').getContext('2d');
  new Chart(scoreTrendCtx, {
    type: 'line',
    data: {
      labels: data.score_trend.map(d => d.date),
      datasets: [{
        label: 'Avg Score',
        data: data.score_trend.map(d => d.score),
        borderColor: '#6366f1',
        backgroundColor: 'rgba(99,102,241,0.1)',
        tension: 0.3,
        fill: true,
        pointRadius: 3,
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        y: { min: 0, max: 100, grid: { color: '#1e293b' } },
        x: { grid: { color: '#1e293b' } }
      }
    }
  });

  // Time per project bar chart
  const timeProjectCtx = document.getElementById('timeProjectChart').getContext('2d');
  new Chart(timeProjectCtx, {
    type: 'bar',
    data: {
      labels: data.time_per_project.map(d => d.project),
      datasets: [{
        label: 'Hours',
        data: data.time_per_project.map(d => d.hours),
        backgroundColor: '#6366f1',
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, grid: { color: '#1e293b' } },
        x: { grid: { color: '#1e293b' } }
      }
    }
  });

  // Heatmap
  buildHeatmap(data.heatmap);

  // Error frequency
  const errCtx = document.getElementById('errorFreqChart').getContext('2d');
  new Chart(errCtx, {
    type: 'bar',
    data: {
      labels: data.error_freq.map(d => d.text.length > 40 ? d.text.slice(0,40)+'…' : d.text),
      datasets: [{
        label: 'Count',
        data: data.error_freq.map(d => d.count),
        backgroundColor: '#ef4444',
        borderRadius: 4,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { beginAtZero: true, grid: { color: '#1e293b' } },
        y: { grid: { color: '#1e293b' } }
      }
    }
  });
}

function buildHeatmap(heatmapData) {
  // Build lookup: [hour][dow] = count
  const lookup = {};
  let maxCount = 1;
  heatmapData.forEach(d => {
    if (!lookup[d.hour]) lookup[d.hour] = {};
    lookup[d.hour][d.dow] = d.count;
    if (d.count > maxCount) maxCount = d.count;
  });

  const grid = document.getElementById('heatmapGrid');
  // Day header row
  const emptyHeader = document.createElement('div');
  emptyHeader.className = 'heatmap-label';
  grid.appendChild(emptyHeader);
  DAYS.forEach(day => {
    const lbl = document.createElement('div');
    lbl.className = 'heatmap-label justify-center';
    lbl.textContent = day;
    grid.appendChild(lbl);
  });

  // Hour rows (0–23)
  for (let h = 0; h < 24; h++) {
    const lbl = document.createElement('div');
    lbl.className = 'heatmap-label';
    lbl.textContent = `${String(h).padStart(2,'0')}:00`;
    grid.appendChild(lbl);

    for (let d = 0; d < 7; d++) {
      const count = (lookup[h] && lookup[h][d]) || 0;
      const cell = document.createElement('div');
      cell.className = 'heatmap-cell';
      const level = count === 0 ? 0 : Math.min(4, Math.ceil((count / maxCount) * 4));
      cell.setAttribute('data-level', level);
      cell.title = `${DAYS[d]} ${String(h).padStart(2,'0')}:00 — ${count} commands`;
      grid.appendChild(cell);
    }
  }
}

loadCharts();
</script>
{% endblock %}
