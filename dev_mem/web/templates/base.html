<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}dev-mem{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { accent: '#6366f1' } } }
    }
  </script>
</head>
<body class="dark h-full bg-slate-900 text-slate-100 flex">

  <!-- Sidebar -->
  <aside class="w-52 flex-shrink-0 flex flex-col bg-slate-950 border-r border-slate-800 min-h-screen">

    <!-- Logo -->
    <div class="px-4 py-4 border-b border-slate-800 flex items-center gap-2">
      <div class="w-6 h-6 rounded-md bg-indigo-600 flex items-center justify-center flex-shrink-0">
        <svg class="w-3.5 h-3.5 text-white" fill="currentColor" viewBox="0 0 20 20">
          <path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 14c1.669 0 3.218.51 4.5 1.385A7.962 7.962 0 0114.5 14c1.255 0 2.443.29 3.5.804v-10A7.968 7.968 0 0014.5 4c-1.255 0-2.443.29-3.5.804V12a1 1 0 11-2 0V4.804z"/>
        </svg>
      </div>
      <span class="text-white font-semibold text-sm tracking-tight">dev-mem</span>
    </div>

    <!-- Primary nav -->
    <nav class="flex-1 px-2 pt-3 pb-2 flex flex-col gap-0.5 overflow-y-auto">

      <a href="{{ url_for('index') }}"
         class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0h6"/>
        </svg>
        Home
      </a>

      <a href="{{ url_for('projects') }}"
         class="nav-link {% if request.endpoint in ('projects','project_detail') %}active{% endif %}">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
        </svg>
        Projects
      </a>

      <a href="{{ url_for('memory') }}"
         class="nav-link {% if request.endpoint == 'memory' %}active{% endif %}">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/>
        </svg>
        Memory
      </a>

      <a href="{{ url_for('analytics') }}"
         class="nav-link {% if request.endpoint == 'analytics' %}active{% endif %}">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
        Analytics
      </a>

      <a href="{{ url_for('team') }}"
         class="nav-link {% if request.endpoint == 'team' %}active{% endif %}">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        Team
      </a>

      <a href="{{ url_for('skills') }}"
         class="nav-link {% if request.endpoint == 'skills' %}active{% endif %}">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
        </svg>
        Skills &amp; Agents
      </a>

      <a href="{{ url_for('system_map') }}"
         class="nav-link {% if request.endpoint == 'system_map' %}active{% endif %}">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 5a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1V5zm10 0a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zM4 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1v-4zm10 0a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"/>
        </svg>
        System Map
      </a>

      <!-- Secondary -->
      <div class="nav-section-label mt-2">Insights</div>

      <a href="{{ url_for('errors') }}"
         class="nav-link {% if request.endpoint == 'errors' %}active{% endif %}">
        <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        Errors
      </a>

      <a href="{{ url_for('daily_today') }}"
         class="nav-link {% if request.endpoint == 'daily' %}active{% endif %}">
        <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
        Daily
      </a>

      <a href="{{ url_for('export_page') }}"
         class="nav-link {% if request.endpoint in ('export_page','export_download') %}active{% endif %}">
        <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
        </svg>
        Export
      </a>

    </nav>

    <!-- SSE status footer -->
    <div class="px-3 py-2.5 border-t border-slate-800 flex items-center gap-2">
      <span id="sse-dot" class="w-1.5 h-1.5 rounded-full bg-slate-600 flex-shrink-0 transition-colors"></span>
      <span id="sse-label" class="text-xs text-slate-600">connecting</span>
      <span id="live-ts" class="text-xs text-slate-700 ml-auto truncate"></span>
    </div>
  </aside>

  <!-- Main -->
  <div class="flex-1 flex flex-col min-h-screen overflow-x-hidden">

    <!-- Top bar -->
    <header class="flex items-center justify-between px-5 py-2.5 bg-slate-950 border-b border-slate-800 min-h-[44px]">
      <div class="breadcrumb">
        {% block breadcrumb %}
        <h1 class="text-sm font-semibold text-slate-200">{% block heading %}{% endblock %}</h1>
        {% endblock %}
      </div>
      <div class="flex items-center gap-3">
        {% block topbar_extra %}{% endblock %}
      </div>
    </header>

    <!-- Content -->
    <main class="flex-1 p-5 overflow-y-auto">
      {% block content %}{% endblock %}
    </main>
  </div>

<script>
(function () {
  const dot    = document.getElementById('sse-dot');
  const label  = document.getElementById('sse-label');
  const liveTs = document.getElementById('live-ts');

  const STAT_IDS = {
    commands:        'live-commands',
    git_events:      'live-git',
    claude_sessions: 'live-claude',
    errors:          'live-errors',
    observations:    'live-obs',
  };

  const feedEl = document.getElementById('live-feed');

  function connect() {
    const es = new EventSource('/api/live');

    es.onopen = () => {
      dot.className = 'w-1.5 h-1.5 rounded-full bg-green-500 flex-shrink-0 transition-colors';
      label.textContent = 'live';
      label.className = 'text-xs text-green-600';
    };

    let _lastObsId = null;

    es.onmessage = (e) => {
      let d;
      try { d = JSON.parse(e.data); } catch { return; }
      if (!d || !d.ts) return;

      liveTs.textContent = d.ts.slice(11, 16);

      // Stat cards
      for (const [key, id] of Object.entries(STAT_IDS)) {
        const el = document.getElementById(id);
        if (el && d[key] !== undefined) {
          if (el.textContent !== String(d[key])) {
            el.textContent = d[key];
            el.classList.add('text-indigo-300');
            setTimeout(() => el.classList.remove('text-indigo-300'), 500);
          }
        }
      }

      // Live feed (home page)
      if (feedEl && d.recent_commands && d.recent_commands.length) {
        feedEl.innerHTML = d.recent_commands.map(r =>
          `<li class="flex items-start gap-2 py-0.5">
            <span class="text-slate-600 tabular-nums flex-shrink-0">${r.ts.slice(11,16)}</span>
            <span class="text-slate-300 font-mono truncate">${escHtml(r.cmd)}</span>
          </li>`
        ).join('');
      }

      // Live prepend new observations (memory page)
      const obsContainer = document.getElementById('obs-list');
      if (obsContainer && d.recent_observations && d.recent_observations.length) {
        const newId = d.recent_observations[0].id;
        if (_lastObsId === null) {
          _lastObsId = newId;
        } else if (newId !== _lastObsId) {
          const fresh = d.recent_observations.filter(o => o.id > _lastObsId);
          _lastObsId = newId;
          fresh.forEach(obs => {
            const badgeClass = {
              bugfix: 'obs-bugfix', feature: 'obs-feature', refactor: 'obs-refactor',
              decision: 'obs-decision', change: 'obs-change', discovery: 'obs-discovery',
            }[obs.type] || 'obs-discovery';
            const card = document.createElement('div');
            card.className = 'card border-indigo-700 transition-colors';
            card.innerHTML = `
              <div class="flex items-start gap-3">
                <span class="obs-badge ${badgeClass} mt-0.5">${escHtml(obs.type)}</span>
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2 mb-0.5">
                    ${obs.project ? `<span class="text-xs text-slate-500 bg-slate-700 px-1.5 py-0.5 rounded">${escHtml(obs.project)}</span>` : ''}
                    <span class="text-xs text-slate-600">${escHtml(obs.created_at)}</span>
                  </div>
                  <p class="text-sm text-slate-200 truncate">${escHtml(obs.title)}</p>
                  ${obs.narrative ? `<p class="text-xs text-slate-400 mt-0.5 line-clamp-2">${escHtml(obs.narrative)}</p>` : ''}
                </div>
                <span class="text-xs text-slate-700 flex-shrink-0">#${obs.id}</span>
              </div>`;
            obsContainer.prepend(card);
            setTimeout(() => card.classList.replace('border-indigo-700', 'border-slate-700'), 2000);
          });
          const heading = document.querySelector('h1');
          if (heading && d.observations) heading.textContent = `Memory (${d.observations.toLocaleString()} observations)`;
        }
      }
    };

    es.onerror = () => {
      dot.className = 'w-1.5 h-1.5 rounded-full bg-red-500 flex-shrink-0';
      label.textContent = 'offline';
      label.className = 'text-xs text-red-600';
      es.close();
      setTimeout(connect, 5000);
    };
  }

  function escHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  connect();
})();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
