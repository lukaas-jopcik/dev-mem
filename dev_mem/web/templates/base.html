<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}dev-mem{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            accent: '#6366f1',
          }
        }
      }
    }
  </script>
</head>
<body class="dark h-full bg-slate-900 text-slate-100 flex">

  <!-- Sidebar -->
  <aside class="sidebar w-56 flex-shrink-0 flex flex-col bg-slate-950 border-r border-slate-800 min-h-screen">
    <div class="px-5 py-4 border-b border-slate-800">
      <span class="text-indigo-400 font-bold text-lg tracking-tight">dev-mem</span>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-1">
      <a href="{{ url_for('index') }}"
         class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0h6"/></svg>
        Home
      </a>
      <a href="{{ url_for('projects') }}"
         class="nav-link {% if request.endpoint in ('projects','project_detail') %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
        Projects
      </a>
      <a href="{{ url_for('analytics') }}"
         class="nav-link {% if request.endpoint == 'analytics' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        Analytics
      </a>
      <a href="{{ url_for('prompts') }}"
         class="nav-link {% if request.endpoint == 'prompts' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-3 3v-3z"/></svg>
        Prompts
      </a>
      <a href="{{ url_for('errors') }}"
         class="nav-link {% if request.endpoint == 'errors' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        Errors
      </a>
      <a href="{{ url_for('learnings') }}"
         class="nav-link {% if request.endpoint == 'learnings' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
        Learnings
      </a>
      <a href="{{ url_for('daily_today') }}"
         class="nav-link {% if request.endpoint == 'daily' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        Daily
      </a>
      <a href="{{ url_for('export_page') }}"
         class="nav-link {% if request.endpoint in ('export_page','export_download') %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
        Export
      </a>
    </nav>
    <div class="px-4 py-3 border-t border-slate-800 text-xs text-slate-500">
      127.0.0.1:8888
    </div>
  </aside>

  <!-- Main -->
  <div class="flex-1 flex flex-col min-h-screen overflow-x-hidden">
    <!-- Top bar -->
    <header class="flex items-center justify-between px-6 py-3 bg-slate-900 border-b border-slate-800">
      <h1 class="text-sm font-semibold text-slate-300">{% block heading %}{% endblock %}</h1>
      <div class="flex items-center gap-3">
        {% block topbar_extra %}{% endblock %}
        <span class="text-xs text-slate-500">{{ now if now is defined else '' }}</span>
      </div>
    </header>

    <!-- Content -->
    <main class="flex-1 p-6 overflow-y-auto">
      {% block content %}{% endblock %}
    </main>
  </div>

</body>
</html>
